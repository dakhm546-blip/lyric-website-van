<!-- បន្ថែមប៊ូតុងនេះក្នុង <div class="header-actions"> នៃ Header -->
<button class="btn-qcm" onclick="openQcmModal()">
  <i class="fa-solid fa-stopwatch"></i> ប្រឡង QCM
</button>

<!-- បន្ថែម Modal QCM នេះនៅខាងក្រោមគេបង្អស់នៃ index.html (មុន <script src="script.js">) -->
<div class="qcm-modal-overlay" id="qcmModal">
  <div class="qcm-card">
    <div class="qcm-header">
      <h2><i class="fa-solid fa-file-pen"></i> ប្រឡង QCM ឱសថសាស្ត្រ</h2>
      <div class="timer-box" id="timerBox">
        <i class="fa-solid fa-clock"></i> <span id="timeDisplay">10:00</span>
      </div>
      <button class="btn-close-qcm" onclick="closeQcmModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- ផ្ទាំងសំណួរ -->
    <div id="qcmBody" class="qcm-body">
      <div id="questionContainer"></div>
      <button class="btn-submit-qcm" onclick="submitQcm()">បញ្ជូនចម្លើយ (Submit)</button>
    </div>

    <!-- ផ្ទាំងបង្ហាញលទ្ធផល -->
    <div id="qcmResult" class="qcm-result" style="display: none;">
      <i class="fa-solid fa-trophy trophy-icon"></i>
      <h3>លទ្ធផលនៃការប្រឡង</h3>
      <p id="scoreText" class="score-text">អ្នកទទួលបាន 0 / 0 ពិន្ទុ</p>
      <button class="btn-submit-qcm" onclick="restartQcm()"><i class="fa-solid fa-rotate-right"></i> ធ្វើម្តងទៀត</button>
    </div>
  </div>
</div>
