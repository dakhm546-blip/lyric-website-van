<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទខ្មែរ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="tts-container">
    <div class="tts-header">
      <h2><i class="fa-solid fa-volume-high"></i> កម្មវិធីអានអត្ថបទខ្មែរ (TTS)</h2>
      <p>បញ្ចូលអក្សរខ្មែរ រួចចុច "ចាក់សំឡេង"</p>
    </div>

    <div class="input-group">
      <textarea id="textInput" placeholder="សូមបញ្ចូលអត្ថបទខ្មែរនៅទីនេះ..."></textarea>
    </div>

    <!-- Audio Player សម្រាប់ចាក់សំឡេង direct -->
    <div style="margin: 15px 0;">
      <audio id="audioPlayer" controls style="width: 100%; display: none;"></audio>
    </div>

    <div class="button-group">
      <button id="btnPlay" class="btn btn-play" onclick="playKhmerAudio()">
        <i class="fa-solid fa-play"></i> ចាក់សំឡេង
      </button>
      <button id="btnClear" class="btn btn-clear" onclick="clearAll()">
        <i class="fa-solid fa-trash-can"></i> លុបអក្សរ
      </button>
    </div>
  </div>

  <script>
    function playKhmerAudio() {
      const text = document.getElementById('textInput').value.trim();
      const player = document.getElementById('audioPlayer');

      if (!text) {
        alert("សូមបញ្ចូលអត្ថបទខ្មែរជាមុនសិន!");
        return;
      }

      // ប្រើ StreamElements API សម្រាប់បង្កើត Audio Link ភាសាខ្មែរ
      const cleanText = encodeURIComponent(text);
      const audioUrl = `https://api.streamelements.com/kappa/v2/speech?voice=Khmer&text=${cleanText}`;

      player.src = audioUrl;
      player.style.display = "block"; // បង្ហាញ Player ពេលចុច
      player.play();
    }

    function clearAll() {
      const player = document.getElementById('audioPlayer');
      document.getElementById('textInput').value = '';
      player.pause();
      player.currentTime = 0;
      player.style.display = "none";
    }
  </script>
</body>
</html>
