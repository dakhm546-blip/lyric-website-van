<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ & AI ឆ្លើយសំណួរ (Smart TTS + AI)</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="tts-container">
    <div class="tts-header">
      <h2><i class="fa-solid fa-robot"></i> កម្មវិធីអានអត្ថបទ & AI Assistant</h2>
      <p>បញ្ចូលអត្ថបទអាន ឬសួរសំណួរទៅកាន់ AI</p>
    </div>

    <!-- ជ្រើសរើសភាសា -->
    <div style="margin-bottom: 12px;">
      <label for="langSelect" style="color: #cbd5e1; font-size: 14px; display: block; margin-bottom: 5px;">
        <i class="fa-solid fa-language"></i> ជ្រើសរើសភាសា៖
      </label>
      <select id="langSelect" style="width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; outline: none;">
        <option value="km-KH">ភាសាខ្មែរ (Khmer)</option>
        <option value="en-US">ភាសាអង់គ្លេស (English)</option>
      </select>
    </div>

    <!-- ប្រអប់បញ្ចូលអត្ថបទ/សំណួរ -->
    <div class="input-group">
      <textarea id="textInput" placeholder="បញ្ចូលអត្ថបទអាន ឬ សួរសំណួរនៅទីនេះ..."></textarea>
    </div>

    <!-- របារបង្ហាញស្ថានភាព -->
    <div id="statusBox" style="margin-top: 8px; color: #38bdf8; font-size: 14px; text-align: center; display: none;">
      <span id="statusText">កំពុងអាន...</span> <span id="chunkStatus"></span>
    </div>

    <!-- ប៊ូតុងបញ្ជាសំខាន់ៗ -->
    <div class="button-group" style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
      <!-- ប៊ូតុងសួរ AI (ថ្មី) -->
      <button class="btn" onclick="askAI()" style="background: #06b6d4; color: white; flex: 1; min-width: 120px;">
        <i class="fa-solid fa-wand-magic-sparkles"></i> សួរ AI
      </button>
      <button class="btn btn-play" onclick="startReading()" style="flex: 1; min-width: 110px;">
        <i class="fa-solid fa-play"></i> ចាក់សំឡេង
      </button>
      <button class="btn" onclick="pauseReading()" style="background: #eab308; color: #000; flex: 1; min-width: 80px;">
        <i class="fa-solid fa-pause"></i> ផ្អាក
      </button>
      <button class="btn btn-stop" onclick="stopReading()" style="flex: 1; min-width: 80px;">
        <i class="fa-solid fa-square"></i> បញ្ឈប់
      </button>
    </div>

    <!-- មុខងារបន្ថែម៖ Download, Share, Clear -->
    <div style="margin-top: 10px; display: flex; gap: 8px;">
      <button class="btn" onclick="downloadAudio()" style="background: #10b981; color: white; flex: 1;">
        <i class="fa-solid fa-download"></i> MP3
      </button>
      <button class="btn" onclick="shareText()" style="background: #8b5cf6; color: white; flex: 1;">
        <i class="fa-solid fa-share-nodes"></i> ចែករំលែក
      </button>
      <button class="btn btn-clear" onclick="clearAll()" style="flex: 0.5;">
        <i class="fa-solid fa-trash-can"></i> លុប
      </button>
    </div>

    <!-- ប្រវត្តិអត្ថបទ (History Log) -->
    <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="color: #cbd5e1; font-size: 14px;"><i class="fa-solid fa-clock-rotate-left"></i> ប្រវត្តិអត្ថបទ/សំណួរ</span>
        <button onclick="clearHistory()" style="background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer;">លុបប្រវត្តិ</button>
      </div>
      <ul id="historyList" style="list-style: none; max-height: 120px; overflow-y: auto; padding: 0;"></ul>
    </div>

  </div>

  <script>
    // 🔑 បញ្ចូល Google Gemini API Key របស់អ្នកនៅទីនេះ (ប្រសិនបើមាន)
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY";

    let chunks = [];
    let currentChunkIndex = 0;
    let isSpeaking = false;

    // 1. មុខងារសួរ AI (Gemini API)
    async function askAI() {
      const prompt = document.getElementById('textInput').value.trim();
      const statusBox = document.getElementById('statusBox');
      const statusText = document.getElementById('statusText');
      const lang = document.getElementById('langSelect').value;

      if (!prompt) {
        alert("សូមបញ្ចូលសំណួរដើម្បីសួរ AI!");
        return;
      }

      stopReading();
      statusBox.style.display = 'block';
      statusText.innerText = "AI កំពុងគិត និងឆ្លើយសំណួរ...";
      document.getElementById('chunkStatus').innerText = "";

      try {
        // បង្កើត Prompt ឱ្យ AI ឆ្លើយតាមភាសាដែលបានជ្រើសរើស
        const langInstruction = (lang === 'km-KH') 
          ? "Please answer the following question in Khmer language concisely and clearly: " 
          : "Please answer the following question in English concisely and clearly: ";

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: langInstruction + prompt }] }]
          })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          const aiReply = data.candidates[0].content.parts[0].text;
          
          // បង្ហាញចម្លើយ AI ចូលក្នុងប្រអប់
          document.getElementById('textInput').value = aiReply;
          statusBox.style.display = 'none';

          // ចាក់សំឡេងអានចម្លើយ AI ដោយស្វ័យប្រវត្តិ
          startReading();
        } else {
          throw new Error("មិនអាចទទួលបានចម្លើយពី AI ទេ");
        }
      } catch (error) {
        console.error(error);
        statusBox.style.display = 'none';
        alert("មានបញ្ហាក្នុងការតភ្ជាប់ជាមួយ AI! សូមពិនិត្យមើល API Key ឬ អ៊ីនធឺណិតរបស់អ្នក។");
      }
    }
