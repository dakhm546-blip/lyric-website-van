<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music & Lyrics Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">
      <i class="fa-solid fa-music"></i>
    </div>
    <div class="user-profile" id="userProfile">
      <span id="userName">អ្នកប្រើប្រាស់</span>
      <button onclick="logout()" class="btn-logout">ចាកចេញ</button>
    </div>
  </header>

  <!-- Main App Layout -->
  <div class="app-container">

    <!-- Left Sidebar: Playlist -->
    <aside class="sidebar">
      <h3><i class="fa-solid fa-list-ul"></i> បញ្ជីចម្រៀង</h3>
      <ul id="playlist">
        <li onclick="selectSong(0)" class="active">
          <i class="fa-solid fa-compact-disc"></i>
          <div>
            <h4>បទទី ១ - ស្វាគមន៍</h4>
            <p>តន្ត្រីសម្រាកអារម្មណ៍</p>
          </div>
        </li>
        <li onclick="selectSong(1)">
          <i class="fa-solid fa-compact-disc"></i>
          <div>
            <h4>បទទី ២ - ចង្វាក់រហ័ស</h4>
            <p>បទភ្លេងសប្បាយៗ</p>
          </div>
        </li>
      </ul>
    </aside>

    <!-- Center: Main Section (Spotify Full Player & Custom Player) -->
    <main class="player-section">

      <!-- Spotify Full Player (បញ្ចូលអាល់ប៊ុម Spotify ពេញលេញ) -->
      <div class="spotify-card" style="margin-bottom: 20px;">
        <iframe 
          style="border-radius:12px;" 
          src="https://open.spotify.com/embed/album/50FfMzzXAiUYYbIrUvRT8V?utm_source=generator" 
          width="100%" 
          height="380" 
          frameBorder="0" 
          allowfullscreen="" 
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
          loading="lazy">
        </iframe>
      </div>

      <!-- Native Audio Player (កូដដើមរបស់អ្នក) -->
      <div class="player-card">
        <div class="song-info">
          <h2 id="songTitle">បទទី ១ - ស្វាគមន៍</h2>
          <p id="artistName">តន្ត្រីសម្រាកអារម្មណ៍</p>
        </div>

        <audio id="audioPlayer" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls></audio>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
