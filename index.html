<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Va Socheat - E-Book Library</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- អក្សរឈ្មោះរំលេចនៅ Background -->
  <div class="bg-watermark">VA SOCHEAT</div>

  <!-- Header -->
  <header>
    <div class="logo">
      <i class="fa-solid fa-book-open-reader"></i>
      <span>Socheat Library</span>
    </div>
    
    <!-- ប្រអប់ស្វែងរកសៀវភៅ -->
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" onkeyup="searchBooks()" placeholder="ស្វែងរកសៀវភៅ...">
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-container">
    <div class="section-title">
      <h2>📚 បញ្ជីសៀវភៅទាំងអស់</h2>
      <p>ជ្រើសរើសសៀវភៅដែលអ្នកចង់អាន ឬទាញយក</p>
    </div>

    <!-- កន្លែងបង្ហាញសៀវភៅ (Book Grid) -->
    <div class="book-grid" id="bookGrid">
      <!-- សៀវភៅនឹងបង្ហាញនៅទីនេះតាមរយៈ JavaScript -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
