<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ & AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="tts-container">
    <div class="tts-header">
      <h2><i class="fa-solid fa-robot"></i> កម្មវិធីអានអត្ថបទ & AI Assistant</h2>
      <p>បញ្ចូលអត្ថបទអាន ឬសួរសំណួរទៅកាន់ AI</p>
    </div>

    <!-- ជ្រើសរើសភាសា -->
    <div style="margin-bottom: 12px;">
      <label for="langSelect" style="color: #cbd5e1; font-size: 14px; display: block; margin-bottom: 5px;">
        <i class="fa-solid fa-language"></i> ជ្រើសរើសភាសា៖
      </label>
      <select id="langSelect" style="width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; outline: none;">
        <option value="km-KH">ភាសាខ្មែរ (Khmer)</option>
        <option value="en-US">ភាសាអង់គ្លេស (English)</option>
      </select>
    </div>

    <!-- ប្រអប់បញ្ចូលអត្ថបទ/សំណួរ -->
    <div class="input-group">
      <textarea id="textInput" placeholder="បញ្ចូលអត្ថបទអាន ឬ សួរសំណួរនៅទីនេះ..."></textarea>
    </div>

    <!-- Audio Player -->
    <audio id="audioPlayer" style="width: 100%; margin-top: 10px; display: none;" controls></audio>

    <!-- របារបង្ហាញស្ថានភាព -->
    <div id="statusBox" style="margin-top: 8px; color: #38bdf8; font-size: 14px; text-align: center; display: none;">
      <span id="statusText">កំពុងដំណើរការ...</span>
    </div>

    <!-- ប៊ូតុងបញ្ជាសំខាន់ៗ -->
    <div class="button-group" style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn" onclick="askAI()" style="background: #06b6d4; color: white; flex: 1; min-width: 120px;">
        <i class="fa-solid fa-wand-magic-sparkles"></i> សួរ AI
      </button>
      <button class="btn btn-play" onclick="playAudio()" style="flex: 1; min-width: 110px;">
        <i class="fa-solid fa-play"></i> ចាក់សំឡេង
      </button>
      <button class="btn btn-stop" onclick="stopAudio()" style="flex: 1; min-width: 80px;">
        <i class="fa-solid fa-square"></i> បញ្ឈប់
      </button>
    </div>

    <!-- មុខងារបន្ថែម -->
    <div style="margin-top: 10px; display: flex; gap: 8px;">
      <button class="btn" onclick="shareText()" style="background: #8b5cf6; color: white; flex: 1;">
        <i class="fa-solid fa-share-nodes"></i> ចែករំលែក
      </button>
      <button class="btn btn-clear" onclick="clearAll()" style="flex: 0.5;">
        <i class="fa-solid fa-trash-can"></i> លុប
      </button>
    </div>

  </div>

  <script>
    // 🔑 API Key ពិតប្រាកដរបស់អ្នកបានបញ្ចូលរួចរាល់
    const GEMINI_API_KEY = "AQ.Ab8RN6IIQZwQjC4KjaBFOB9C84VWhQjrCTKulgFZkOXXUIs9w";

    const player = document.getElementById('audioPlayer');

    function playAudio() {
      const text = document.getElementById('textInput').value.trim();
      const lang = document.getElementById('langSelect').value;

      if (!text) {
        alert("សូមបញ្ចូលអត្ថបទជាមុនសិន!");
        return;
      }

      const cleanText = encodeURIComponent(text.substring(0, 200));
      const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${cleanText}&tl=${lang.split('-')[0]}&client=tw-ob`;

      player.src = audioUrl;
      player.style.display = "block";
      player.play().catch(() => {
        useWebSpeech(text, lang);
      });
    }

    function useWebSpeech(text, lang) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
      }
    }

    function stopAudio() {
      player.pause();
      player.currentTime = 0;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // មុខងារសួរ AI
    async function askAI() {
      const prompt = document.getElementById('textInput').value.trim();
      const statusBox = document.getElementById('statusBox');
      const statusText = document.getElementById('statusText');
      const lang = document.getElementById('langSelect').value;

      if (!prompt) {
        alert("សូមបញ្ចូលសំណួរដើម្បីសួរ AI!");
        return;
      }

      stopAudio();
      statusBox.style.display = 'block';
      statusText.innerText = "AI កំពុងគិត និងរកចម្លើយ...";

      try {
        const instruction = (lang === 'km-KH') 
          ? "សូមឆ្លើយសំណួរខាងក្រោមជាភាសាខ្មែរ ឱ្យបានត្រឹមត្រូវ និងច្បាស់លាស់៖ " 
          : "Please answer concisely and accurately in English: ";

        // បញ្ជូន API Key តាម Header x-goog-api-key ដើម្បីកុំឱ្យមានបញ្ហា
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'x-goog-api-key': GEMINI_API_KEY 
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: instruction + prompt }] }]
          })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          const reply = data.candidates[0].content.parts[0].text;
          document.getElementById('textInput').value = reply;
          statusBox.style.display = 'none';
          playAudio();
        } else {
          alert("មានបញ្ហា API ៖ " + (data.error?.message || "សូមពិនិត្យមើលម្ដងទៀត"));
          statusBox.style.display = 'none';
        }
      } catch (error) {
        console.error(error);
        statusBox.style.display = 'none';
        alert("មិនអាចភ្ជាប់ទៅ AI បានទេ! សូមពិនិត្យមើលការតភ្ជាប់អ៊ីនធឺណិត។");
      }
    }

    function clearAll() {
      stopAudio();
      document.getElementById('textInput').value = '';
      player.style.display = "none";
    }

    function shareText() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) return;
      if (navigator.share) {
        navigator.share({ title: 'AI Response', text: text });
      } else {
        navigator.clipboard.writeText(text);
        alert("បាន Copy អត្ថបទរួចរាល់!");
      }
    }
  </script>
</body>
  </html>
