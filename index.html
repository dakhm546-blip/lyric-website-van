<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>កម្មវិធីអានអត្ថបទ (TTS)</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- ផ្លូវកាត់ Script ផ្លូវការសម្រាប់អានខ្មែរ និងអង់គ្លេស -->
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE_KEY"></script>
</head>
<body>

  <div class="tts-container">
    <div class="tts-header">
      <h2><i class="fa-solid fa-volume-high"></i> កម្មវិធីអានអត្ថបទ (TTS)</h2>
      <p>ជ្រើសរើសភាសា បញ្ចូលអត្ថបទ រួចចុច "ចាក់សំឡេង"</p>
    </div>

    <!-- ជ្រើសរើសភាសា -->
    <div style="margin-bottom: 15px;">
      <label for="langSelect" style="color: #cbd5e1; font-size: 14px; display: block; margin-bottom: 5px;">
        <i class="fa-solid fa-language"></i> ជ្រើសរើសភាសា៖
      </label>
      <select id="langSelect" style="width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; outline: none;">
        <option value="Khmer Female">ភាសាខ្មែរ (Khmer)</option>
        <option value="UK English Female">ភាសាអង់គ្លេស (US/UK English)</option>
      </select>
    </div>

    <!-- ប្រអប់បញ្ចូលអត្ថបទ -->
    <div class="input-group">
      <textarea id="textInput" placeholder="Enter text or បញ្ចូលអត្ថបទ..."></textarea>
    </div>

    <!-- ប៊ូតុងបញ្ជា -->
    <div class="button-group" style="margin-top: 15px;">
      <button id="btnPlay" class="btn btn-play" onclick="playSpeech()">
        <i class="fa-solid fa-play"></i> ចាក់សំឡេង
      </button>
      <button id="btnStop" class="btn btn-stop" onclick="stopSpeech()">
        <i class="fa-solid fa-square"></i> បញ្ឈប់
      </button>
      <button id="btnClear" class="btn btn-clear" onclick="clearAll()">
        <i class="fa-solid fa-trash-can"></i> លុបអក្សរ
      </button>
    </div>
  </div>

  <script>
    function playSpeech() {
      const text = document.getElementById('textInput').value.trim();
      const selectedVoice = document.getElementById('langSelect').value;

      if (!text) {
        alert("សូមបញ្ចូលអត្ថបទជាមុនសិន! / Please enter text!");
        return;
      }

      // បញ្ឈប់សំឡេងចាស់ប្រសិនបើកំពុងចាក់
      if (responsiveVoice.isPlaying()) {
        responsiveVoice.cancel();
      }

      // ចាក់សំឡេងតាមភាសាដែលបានជ្រើសរើស
      responsiveVoice.speak(text, selectedVoice);
    }

    function stopSpeech() {
      if (responsiveVoice.isPlaying()) {
        responsiveVoice.cancel();
      }
    }

    function clearAll() {
      stopSpeech();
      document.getElementById('textInput').value = '';
    }
  </script>
</body>
      </html>
